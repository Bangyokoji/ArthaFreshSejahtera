<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Congrats Thalitaa sayanggg 🎓❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root { --pink: #ff85a2; --cream: #fdf5e6; --dark-pink: #ff4d79; --brown: #8d6e63; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cream);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; height: 100vh; width: 100vw;
            background-image: url('https://lh3.googleusercontent.com/d/1y0F5zvIMw4I6c8HiaUJ2YrtpqDH-QlIn');
            background-size: cover; background-position: center;
        }

        #bgVideo {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            width: auto; height: auto; transform: translate(-50%, -50%);
            object-fit: cover; z-index: 8500; display: block;
        }

        .petal { position: fixed; top: -10%; z-index: 1; pointer-events: none; color: var(--pink); font-size: 1.5rem; }

        /* TOMBOL KEMBALI FIX */
        .btn-back-floating {
            position: fixed; top: 20px; left: 20px; z-index: 25000;
            background: white; border: 2px solid var(--pink); color: var(--dark-pink);
            padding: 8px 18px; border-radius: 50px; font-weight: bold;
            display: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9000; background: transparent; padding: 20px; text-align: center; }
        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(8px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.3); display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn-main { background: var(--pink); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; max-width: 260px; }

        #board { position: relative; width: 100%; height: 100%; display: none; z-index: 10; overflow: hidden; }
        .title { text-align: center; font-family: 'Caveat'; font-size: 2.5rem; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.6); padding-top: 60px; pointer-events: none; position: relative; z-index: 5; }
        
        .card { position: absolute; width: 105px; height: 135px; cursor: pointer; z-index: 100; }
        .card-inner { position: relative; width: 100%; height: 100%; background: white; padding: 6px 6px 18px 6px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* GRADUATION DARLING OVERLAY */
        #grad-gallery-overlay {
            position: fixed; inset: 0; z-index: 19000; display: none;
            flex-direction: column; align-items: center; justify-content: flex-start;
            background: linear-gradient(to bottom, #fdf5e6, #ffd1dc);
            padding-top: 80px;
        }
        .grad-title-text { font-family: 'Caveat'; font-size: 2.5rem; color: var(--dark-pink); margin-bottom: 30px; z-index: 10; }
        
        .swiper-grad { width: 100%; height: 480px; }
        .swiper-slide-grad { width: 280px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .grad-polaroid-frame {
            background: white;
            padding: 12px 12px 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; height: 350px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .grad-polaroid-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        /* ANIMASI PESAN AWAN */
        .grad-cloud-caption {
            opacity: 0;
            transform: translateY(20px) scale(0.7);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.2);
            border: 2px solid var(--pink);
            font-family: 'Caveat';
            font-size: 1.4rem;
            color: #444;
            text-align: center;
            width: 90%;
            position: relative;
        }

        /* Aktif saat slide di tengah */
        .swiper-slide-active .grad-cloud-caption {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* KAMERA STYLES */
        #camera-ucapan-container { position: fixed; inset: 0; z-index: 18000; display: none; flex-direction: column; align-items: center; background: #000; }
        #cam-preview-wrapper { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
        #ucapan-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        #draggable-toga { position: absolute; top: 20%; left: 30%; width: 130px; z-index: 100; touch-action: none; filter: drop-shadow(0 0 10px gold); }
        
        /* BOARD RE-POSITIONS */
        .p1 { top: 18%; left: 10%; transform: rotate(-5deg); }
        .p2 { top: 15%; right: 10%; transform: rotate(5deg); }
        .p3 { top: 35%; left: 35%; transform: rotate(-3deg); }
        .p4 { top: 52%; left: 8%; transform: rotate(7deg); }
        .p5 { top: 54%; right: 8%; transform: rotate(-6deg); }
        .p6 { top: 75%; left: 15%; transform: rotate(-4deg); }
        .p7 { top: 73%; right: 15%; transform: rotate(8deg); }

        #music-control { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: none; }
        .vinyl { width: 45px; height: 45px; background: #333; border-radius: 50%; border: 3px solid #444; display: flex; align-items: center; justify-content: center; }
        .spinning { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #message-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 21000; display: none; text-align: center; width: 280px; border: 3px solid var(--pink); }
    </style>
</head>
<body onclick="createHeart(event)">

    <audio id="lagu" loop><source src="https://raw.githubusercontent.com/Bangyokoji/For-you/128404a69d31eac059a044f05b140b5055b8f3b0/Nadhif%20Basalamah%20-%20kota%20ini%20tak%20sama%20tanpamu%20(Official%20Lyric%20Video)%20-%20(320%20Kbps).mp3" type="audio/mpeg"></audio>
    <video id="bgVideo" autoplay muted loop playsinline><source src="https://raw.githubusercontent.com/Bangyokoji/For-you/4c439865a73d44cb052f5814a22e5129ad0ec2c3/PinDown.io_@ginagliss1473_1777946922.mp4" type="video/mp4"></video>

    <!-- TOMBOL KEMBALI GLOBAL -->
    <button class="btn-back-floating" id="global-back-btn" onclick="backToModeSelection()">← Kembali</button>

    <div id="music-control" onclick="toggleMusic()"><div class="vinyl" id="vinyl"></div></div>
    <div id="close-area" onclick="backToBoard()" style="position:fixed; inset:0; z-index:4000; display:none;"></div>
    <button id="global-reveal-btn" style="position:fixed; bottom:10%; left:50%; transform:translate(-50%, 0) scale(0); background:var(--dark-pink); color:white; border:none; padding:12px 25px; border-radius:50px; font-weight:bold; z-index:8000; display:none;" onclick="openQuiz()">Buka Pesan Sayang 💌</button>

    <!-- GALERI GRADUATION PHOTO DARLING -->
    <div id="grad-gallery-overlay">
        <h2 class="grad-title-text">Graduation Darling 🎓🧸</h2>
        <div class="swiper swiper-grad">
            <div class="swiper-wrapper">
                <!-- Slide 1 -->
                <div class="swiper-slide swiper-slide-grad">
                    <div class="grad-polaroid-frame">
                        <img src="https://lh3.googleusercontent.com/d/1oTUasXgoJByzhauv-XwuCGe74yYc3sKf">
                    </div>
                    <div class="grad-cloud-caption">Cantiknya kesayangan aku pakai toga.. 😍☁️</div>
                </div>
                <!-- Slide 2 -->
                <div class="swiper-slide swiper-slide-grad">
                    <div class="grad-polaroid-frame">
                        <img src="https://lh3.googleusercontent.com/d/1tauWbtDHhIYVOA6uTJKDt0580G74fwtn">
                    </div>
                    <div class="grad-cloud-caption">Pintarnya Thalita, bangga banget! 🎓✨☁️</div>
                </div>
                <!-- Slide 3 -->
                <div class="swiper-slide swiper-slide-grad">
                    <div class="grad-polaroid-frame">
                        <img src="https://lh3.googleusercontent.com/d/1hReor1qhGhbirnyHic-1rLPhRGSDRrRY">
                    </div>
                    <div class="grad-cloud-caption">Senyummu itu loh, bikin melting.. 🧸❤️☁️</div>
                </div>
                <!-- Slide 4 -->
                <div class="swiper-slide swiper-slide-grad">
                    <div class="grad-polaroid-frame">
                        <img src="https://lh3.googleusercontent.com/d/1lO3Hh88qhT53k7RDDIuFxIfVvtm1gwPk">
                    </div>
                    <div class="grad-cloud-caption">Semoga berkah ya gelarnya sayang! 🌹☁️</div>
                </div>
                <!-- Slide 5 -->
                <div class="swiper-slide swiper-slide-grad">
                    <div class="grad-polaroid-frame">
                        <img src="https://lh3.googleusercontent.com/d/1lxsiwAEX_F8ec6O3fMYLFaf3etzd-ypn">
                    </div>
                    <div class="grad-cloud-caption">Tetap yang paling bersinar! 🌟☁️</div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <!-- Mode Kamera -->
    <div id="camera-ucapan-container">
        <div id="cam-preview-wrapper"><video id="ucapan-video" autoplay playsinline></video></div>
        <img id="draggable-toga" src="https://raw.githubusercontent.com/Bangyokoji/For-you/7e6e04cf14e68d5925fccf66264853b3ad754b7d/1778046603580.png">
        <div class="swiper mySwiper" style="position:absolute; bottom:8%; width:100%; height:240px; z-index:10;">
            <div class="swiper-wrapper" id="ucapan-wrapper"></div>
        </div>
        <button class="btn-main" style="position:absolute; bottom:25px; right:25px; width:auto; background:rgba(0,0,0,0.4); border:1px solid white;" onclick="switchCamera()">🔄 Kamera</button>
    </div>

    <!-- MAIN SCREENS -->
    <div id="sc1" class="screen">
        <div class="glass-card">
            <div style="font-size:80px; cursor:pointer;" onclick="toSc2()">📩</div>
            <p style="color:var(--dark-pink); font-weight:bold;">ADA PESAN UNTUKMU!</p>
        </div>
    </div>

    <div id="sc2" class="screen" style="display:none;">
        <div class="glass-card">
            <h2 style="font-family:'Caveat'; font-size:2.2rem; color:#5d4037;">Siapkan hatimu ya? 🧸</h2>
            <button class="btn-main" onclick="startApp()">MASUK KE DUNIA KITA ✨</button>
            <button class="btn-main" style="background:linear-gradient(135deg, #ff4d79, #ff85a2); margin-top:10px;" onclick="startUcapan()">KARTU UCAPAN KAMERA 💌</button>
            <button class="btn-main" style="background:linear-gradient(135deg, #4fc3f7, #81d4fa); margin-top:10px;" onclick="openGradGallery()">GRADUATION PHOTO DARLING 🎓🧸</button>
        </div>
    </div>

    <!-- POLAROID BOARD -->
    <div id="board">
        <h1 class="title">Our Beautiful Chapter ❤️</h1>
        <div class="card p1" data-q="Kamu bangga sama diri sendiri hari ini? 🎓" onclick="zoomCard(this)"><div class="card-inner"><img src="https://lh3.googleusercontent.com/d/1kV5l1-cLJ1aLQd_I-zBOtjK9ehbfmNc5"></div></div>
        <div class="card p2" data-q="Kamu sayang aku kan? ❤️" onclick="zoomCard(this)"><div class="card-inner"><img src="https://lh3.googleusercontent.com/d/1X_sdUfVzD7TEMWeglfQdMkfNFHxsbUM1"></div></div>
        <div class="card p3" data-q="Sering-sering senyum ya? 😊" onclick="zoomCard(this)"><div class="card-inner"><img src="https://lh3.googleusercontent.com/d/17CNVqgj58T4fwRHDfGoPSpql1mocdgWM"></div></div>
        <div class="card p4" data-q="Jangan lupa istirahat ya? 😴" onclick="zoomCard(this)"><div class="card-inner"><img src="https://lh3.googleusercontent.com/d/15N-ZS0lhqvB5GZUnjKBZKObkyHV7xwHh"></div></div>
        <div class="card p5" data-q="Jangan mbotok ya yang? 🌸" onclick="zoomCard(this)"><div class="card-inner"><img src="https://lh3.googleusercontent.com/d/1jxXCedbKke_eFqFJtEr1Gs_M4IlyCr9d"></div></div>
        <div class="card p6" data-q="Semangat buat kedepannya? 🤝" onclick="zoomCard(this)"><div class="card-inner"><img src="https://lh3.googleusercontent.com/d/1zYvu4jKFWsl4OI-2b2wos5aT2f8uyUaP"></div></div>
        <div class="card p7" id="card7" data-q="Rating buat web buatan aku? 🌸" onclick="zoomCard(this)"><div class="card-inner"><img src="https://lh3.googleusercontent.com/d/1zhBg0KVZpBSYn3nt8F566bJadLw-GbT9"></div></div>
    </div>

    <!-- SCRIPTS -->
    <script>
        const nomorWA = "6285713813068";
        let currentActive = null;
        let cameraStream = null;
        const audio = document.getElementById('lagu');
        const vinyl = document.getElementById('vinyl');
        const bgVideo = document.getElementById('bgVideo');
        let gradSwiper = null;

        // PETAL ANIMATION
        setInterval(() => {
            if (document.getElementById('camera-ucapan-container').style.display === 'flex') return;
            const petals = ['🌸', '❤️', '✨'];
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerHTML = petals[Math.floor(Math.random() * petals.length)];
            petal.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(petal);
            gsap.to(petal, { y: window.innerHeight + 50, x: "random(-50, 50)", rotation: 360, duration: 5, ease: "none", onComplete: () => petal.remove() });
        }, 700);

        // NAVIGASI
        function toSc2() { gsap.to("#sc1", { opacity:0, duration:0.5, onComplete:() => { document.getElementById('sc1').style.display='none'; document.getElementById('sc2').style.display='flex'; }}); }
        
        function backToModeSelection() {
            document.getElementById('board').style.display='none';
            document.getElementById('camera-ucapan-container').style.display='none';
            document.getElementById('grad-gallery-overlay').style.display='none';
            document.getElementById('global-back-btn').style.display='none';
            document.getElementById('bgVideo').style.display='block';
            document.getElementById('sc2').style.display='flex';
            gsap.to([bgVideo, "#sc2"], { opacity: 1, duration: 0.5 });
            if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
        }

        function openGradGallery() {
            document.getElementById('grad-gallery-overlay').style.display = 'flex';
            document.getElementById('bgVideo').style.display = 'none';
            document.getElementById('sc2').style.display = 'none';
            document.getElementById('global-back-btn').style.display = 'block';
            if (!gradSwiper) {
                gradSwiper = new Swiper(".swiper-grad", {
                    effect: "coverflow", centeredSlides: true, slidesPerView: "auto", loop: true,
                    coverflowEffect: { rotate: 20, stretch: 0, depth: 100, modifier: 1, slideShadows: true },
                    pagination: { el: ".swiper-pagination" }
                });
            }
        }

        // KAMERA
        async function startUcapan() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('ucapan-video').srcObject = cameraStream;
                document.getElementById('camera-ucapan-container').style.display = 'flex';
                document.getElementById('sc2').style.display = 'none';
                document.getElementById('global-back-btn').style.display = 'block';
                initCamSwiper();
                initTogaDrag();
            } catch (e) { alert("Kamera error 🎥"); }
        }

        function initCamSwiper() {
            const assets = ["https://lh3.googleusercontent.com/d/1kV5l1-cLJ1aLQd_I-zBOtjK9ehbfmNc5", "https://lh3.googleusercontent.com/d/1X_sdUfVzD7TEMWeglfQdMkfNFHxsbUM1", "https://lh3.googleusercontent.com/d/17CNVqgj58T4fwRHDfGoPSpql1mocdgWM", "https://lh3.googleusercontent.com/d/15N-ZS0lhqvB5GZUnjKBZKObkyHV7xwHh", "https://lh3.googleusercontent.com/d/1jxXCedbKke_eFqFJtEr1Gs_M4IlyCr9d"];
            const wrap = document.getElementById('ucapan-wrapper'); wrap.innerHTML = '';
            assets.forEach(s => { wrap.innerHTML += `<div class="swiper-slide"><div class="card-inner" style="width:140px; height:180px;"><img src="${s}"></div></div>`; });
            new Swiper(".mySwiper", { effect: "coverflow", centeredSlides: true, slidesPerView: "auto", loop: true });
        }

        function initTogaDrag() {
            const toga = document.getElementById('draggable-toga');
            let x = 0, y = 0, dragging = false, sx, sy;
            toga.addEventListener('pointerdown', e => { dragging = true; sx = e.clientX - x; sy = e.clientY - y; toga.setPointerCapture(e.pointerId); });
            window.addEventListener('pointermove', e => { if (!dragging) return; x = e.clientX - sx; y = e.clientY - sy; toga.style.transform = `translate(${x}px, ${y}px)`; });
            window.addEventListener('pointerup', () => dragging = false);
        }

        // BOARD
        function startApp() { 
            audio.play().catch(()=>{}); document.getElementById('music-control').style.display='flex'; document.getElementById('global-back-btn').style.display='block'; vinyl.classList.add('spinning');
            gsap.to([bgVideo, "#sc2"], { opacity:0, duration:0.5, onComplete:() => { bgVideo.style.display='none'; document.getElementById('sc2').style.display='none'; document.getElementById('board').style.display='block'; }});
        }

        function zoomCard(el) {
            if (currentActive) return; currentActive = el;
            el.style.zIndex = "5000"; document.getElementById('close-area').style.display = 'block'; document.getElementById('global-back-btn').style.display='none';
            gsap.to(el, { x: (window.innerWidth/2 - el.getBoundingClientRect().left - 52), y: (window.innerHeight/2 - el.getBoundingClientRect().top - 67), scale: 2.3, rotation: 0, duration: 0.6, onComplete: () => {
                const btn = document.getElementById('global-reveal-btn'); btn.style.display = "block"; gsap.to(btn, { scale: 1, duration: 0.3 });
            }});
        }

        function backToBoard() {
            if (!currentActive) return;
            gsap.to("#global-reveal-btn", { scale: 0, duration: 0.2, onComplete: () => document.getElementById('global-reveal-btn').style.display = "none" });
            gsap.to(currentActive, { x: 0, y: 0, scale: 1, rotation: "random(-10, 10)", duration: 0.5, onComplete: () => { currentActive.style.zIndex = "100"; currentActive = null; document.getElementById('close-area').style.display = 'none'; document.getElementById('global-back-btn').style.display='block'; }});
        }

        function openQuiz() { alert(currentActive.getAttribute('data-q')); backToBoard(); }
        function toggleMusic() { audio.paused ? (audio.play(), vinyl.classList.add('spinning')) : (audio.pause(), vinyl.classList.remove('spinning')); }
        function createHeart(e) {
            const h = document.createElement('div'); h.innerHTML = '❤️'; h.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY}px; z-index:30000; pointer-events:none;`;
            document.body.appendChild(h); gsap.to(h, { y:-100, opacity:0, duration:1, onComplete:() => h.remove() });
        }
    </script>
</body>
</html>
